<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="每日对账">
<meta name="theme-color" content="#F4F1EA">
<meta name="description" content="店铺每日记账与盈亏分析 · 热敏小票美学">
<title>每日对账 · 热敏小票</title>
<style>
/* ============================================================
   PHASE 0: Design System — Thermal Receipt × Japanese Stationery
   ============================================================ */
:root {
  /* ── Palette: Warm Paper + Ink ── */
  --paper:        #F4F1EA;
  --paper-warm:   #EDE8DC;
  --paper-cool:   #E8E4DB;
  --ink:          #2D2D2D;
  --ink-soft:     #4A4A4A;
  --ink-dim:      #6B6B6B;
  --ink-faint:    #A8A8A8;
  --ink-ghost:    #D0CCC5;

  /* ── Accent ── */
  --blue:         #2563EB;
  --blue-bg:      rgba(37,99,235,0.08);
  --red:          #C1292E;
  --red-bg:       rgba(193,41,46,0.08);
  --orange:       #C2410C;
  --orange-bg:    rgba(194,65,12,0.08);
  --green:        #0D7C3D;
  --green-bg:     rgba(13,124,61,0.08);
  --purple:       #6D28D9;
  --stamp-red:    #C1292E;

  /* ── Surfaces ── */
  --card:         #FFFFFF;
  --card-hover:   #FAF9F6;
  --surface:      #F7F5F0;
  --line:         #E0DBD0;
  --line-strong:  #C5BFB0;
  --line-dotted:  #D5D0C5;
  --shadow-sm:    0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:    0 2px 8px rgba(0,0,0,0.06);
  --shadow-lg:    0 4px 16px rgba(0,0,0,0.08);

  /* ── Typography: Major Third (1.25) ── */
  --text-xs:      0.667rem;   /* 12px @18px base */
  --text-sm:      0.778rem;   /* 14px */
  --text-base:    1rem;       /* 18px */
  --text-md:      1.111rem;   /* 20px */
  --text-lg:      1.333rem;   /* 24px */
  --text-xl:      1.556rem;   /* 28px */
  --text-2xl:     1.944rem;   /* 35px */
  --text-3xl:     2.333rem;   /* 42px */

  /* ── Spacing: 4px grid ── */
  --space-1:      4px;
  --space-2:      8px;
  --space-3:      12px;
  --space-4:      16px;
  --space-5:      20px;
  --space-6:      24px;
  --space-8:      32px;
  --space-10:     40px;

  /* ── Border Radius ── */
  --radius-0:     0;
  --radius-sm:    2px;
  --radius-md:    4px;
  --radius-lg:    6px;
  --radius-xl:    10px;

  /* ── Fonts ── */
  --font-mono:    'JetBrains Mono', 'Cascadia Code', 'SF Mono', 'Menlo', 'Consolas', monospace;
  --font-sans:    -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  --font-serif:   'Noto Serif SC', 'Source Han Serif SC', 'STSong', 'SimSun', 'Georgia', serif;

  /* ── Motion ── */
  --ease-out:     cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in-out:  cubic-bezier(0.65, 0, 0.35, 1);
  --ease-spring:  cubic-bezier(0.34, 1.56, 0.64, 1);
  --dur-fast:     120ms;
  --dur-normal:   200ms;
  --dur-slow:     300ms;
  --dur-glacial:  600ms;

  /* ── Layout ── */
  --nav-height:   56px;
  --header-height: 48px;
}

/* ── Dark Mode: Thermal Negative ── */
@media (prefers-color-scheme: dark) {
  :root {
    --paper:        #1C1C1C;
    --paper-warm:   #22201C;
    --paper-cool:   #1E1E1E;
    --ink:          #E8E2D6;
    --ink-soft:     #CCC5B5;
    --ink-dim:      #9B9485;
    --ink-faint:    #6B6558;
    --ink-ghost:    #3E3A32;
    --card:         #262422;
    --card-hover:   #2C2A27;
    --surface:      #22201C;
    --line:         #333028;
    --line-strong:  #4A4538;
    --line-dotted:  #3E3A32;
    --shadow-sm:    0 1px 2px rgba(0,0,0,0.2);
    --shadow-md:   0 2px 8px rgba(0,0,0,0.3);
    --shadow-lg:   0 4px 16px rgba(0,0,0,0.4);
    --blue:         #60A5FA;
    --blue-bg:      rgba(96,165,250,0.12);
    --red:          #F87171;
    --red-bg:       rgba(248,113,113,0.12);
    --orange:       #FB923C;
    --orange-bg:    rgba(251,146,60,0.12);
    --green:        #4ADE80;
    --green-bg:     rgba(74,222,128,0.12);
    --purple:       #A78BFA;
    --stamp-red:    #EF4444;
  }
}
/* Manual dark mode override */
body.dark {
  --paper:        #1C1C1C;
  --paper-warm:   #22201C;
  --paper-cool:   #1E1E1E;
  --ink:          #E8E2D6;
  --ink-soft:     #CCC5B5;
  --ink-dim:      #9B9485;
  --ink-faint:    #6B6558;
  --ink-ghost:    #3E3A32;
  --card:         #262422;
  --card-hover:   #2C2A27;
  --surface:      #22201C;
  --line:         #333028;
  --line-strong:  #4A4538;
  --line-dotted:  #3E3A32;
  --shadow-sm:    0 1px 2px rgba(0,0,0,0.2);
  --shadow-md:   0 2px 8px rgba(0,0,0,0.3);
  --shadow-lg:   0 4px 16px rgba(0,0,0,0.4);
  --blue:         #60A5FA;
  --blue-bg:      rgba(96,165,250,0.12);
  --red:          #F87171;
  --red-bg:       rgba(248,113,113,0.12);
  --orange:       #FB923C;
  --orange-bg:    rgba(251,146,60,0.12);
  --green:        #4ADE80;
  --green-bg:     rgba(74,222,128,0.12);
  --purple:       #A78BFA;
  --stamp-red:    #EF4444;
}
body.light {
  --paper:        #F4F1EA;
  --paper-warm:   #EDE8DC;
  --paper-cool:   #E8E4DB;
  --ink:          #2D2D2D;
  --ink-soft:     #4A4A4A;
  --ink-dim:      #6B6B6B;
  --ink-faint:    #A8A8A8;
  --ink-ghost:    #D0CCC5;
  --card:         #FFFFFF;
  --card-hover:   #FAF9F6;
  --surface:      #F7F5F0;
  --line:         #E0DBD0;
  --line-strong:  #C5BFB0;
  --line-dotted:  #D5D0C5;
  --shadow-sm:    0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:   0 2px 8px rgba(0,0,0,0.06);
  --shadow-lg:   0 4px 16px rgba(0,0,0,0.08);
  --blue:         #2563EB;
  --blue-bg:      rgba(37,99,235,0.08);
  --red:          #C1292E;
  --red-bg:       rgba(193,41,46,0.08);
  --orange:       #C2410C;
  --orange-bg:    rgba(194,65,12,0.08);
  --green:        #0D7C3D;
  --green-bg:     rgba(13,124,61,0.08);
  --purple:       #6D28D9;
  --stamp-red:    #C1292E;
}

/* ============================================================
   Reset + Base
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html {
  font-size: 18px;
  -webkit-tap-highlight-color: transparent;
  scroll-behavior: smooth;
}
body {
  font-family: var(--font-sans);
  background: var(--paper);
  color: var(--ink);
  min-height: 100dvh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background-color var(--dur-slow) var(--ease-out),
              color var(--dur-slow) var(--ease-out);
  padding-bottom: env(safe-area-inset-bottom, 0);
}
input, button, select, textarea {
  font-family: inherit; font-size: inherit; color: inherit;
}
button { cursor: pointer; border: none; background: none; }
input { border: none; outline: none; background: none; }
::selection { background: var(--blue-bg); color: var(--blue); }

/* Paper texture overlay */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
body.dark::before { opacity: 0.05; }

/* ============================================================
   PHASE 5.4: Splash Screen
   ============================================================ */
.splash {
  position: fixed; inset: 0; z-index: 1000;
  background: var(--paper);
  display: flex; align-items: center; justify-content: center;
  transition: opacity var(--dur-glacial) var(--ease-out),
              clip-path var(--dur-glacial) var(--ease-in-out);
}
.splash.hide {
  opacity: 0;
  clip-path: inset(0 0 100% 0);
  pointer-events: none;
}
.splash-inner {
  font-family: var(--font-serif);
  font-size: var(--text-xl);
  color: var(--ink-dim);
  letter-spacing: 0.08em;
  animation: splashPulse 1.2s var(--ease-in-out) infinite;
}
@keyframes splashPulse {
  0%, 100% { opacity: 0.4; transform: scale(0.98); }
  50% { opacity: 1; transform: scale(1); }
}

/* ============================================================
   App Shell
   ============================================================ */
.app {
  position: relative; z-index: 1;
  max-width: 1180px; margin: 0 auto;
  padding: var(--space-4) var(--space-4) calc(var(--nav-height) + var(--space-8));
}

/* ============================================================
   Header — Receipt Timestamp Style
   ============================================================ */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-3) 0 var(--space-4);
  border-bottom: 2px solid var(--ink);
  margin-bottom: var(--space-4);
  gap: var(--space-3);
  flex-wrap: wrap;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
.header-title {
  font-family: var(--font-serif);
  font-size: var(--text-lg);
  font-weight: 700;
  letter-spacing: 0.04em;
  display: flex; align-items: center; gap: var(--space-2);
  flex-wrap: wrap;
}
.header-subtitle {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  color: var(--ink-faint);
  letter-spacing: 0.06em;
}
.header-right { display: flex; gap: var(--space-2); align-items: center; }

/* Sync badge — [PRINTED] / [DIGITAL] */
.sync-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: var(--font-mono); font-size: 10px; font-weight: 600;
  padding: 2px 8px; letter-spacing: 0.04em;
  cursor: pointer; border: 1px solid;
  transition: all var(--dur-fast) var(--ease-out);
}
.sync-badge.active {
  background: var(--green-bg); color: var(--green);
  border-color: var(--green);
}
.sync-badge.inactive {
  background: transparent; color: var(--ink-faint);
  border-color: var(--ink-ghost);
}
.sync-badge.inactive:hover {
  color: var(--blue); border-color: var(--blue);
}

/* Install button */
.btn-install {
  font-family: var(--font-mono); font-size: 10px; font-weight: 600;
  padding: 3px 10px; letter-spacing: 0.04em;
  border: 1px solid var(--ink-ghost);
  color: var(--ink-dim);
  border-radius: var(--radius-sm);
  transition: all var(--dur-fast) var(--ease-out);
  display: inline-flex; align-items: center; gap: 4px;
}
.btn-install:hover { border-color: var(--ink); color: var(--ink); }

/* Dark mode toggle */
.btn-theme {
  font-size: 16px; padding: 4px 8px;
  border-radius: var(--radius-sm);
  transition: transform var(--dur-fast) var(--ease-out);
  line-height: 1;
}
.btn-theme:active { transform: scale(0.9); }

/* ============================================================
   PHASE 1: Dual Navigation — Desktop Top Tabs + Mobile Bottom Bar
   ============================================================ */

/* Desktop: Top tabs (hidden on mobile) */
.tabs-desktop {
  display: flex; gap: 0;
  margin-bottom: var(--space-5);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.tab-d {
  padding: var(--space-2) var(--space-4);
  font-size: var(--text-sm); font-weight: 500;
  color: var(--ink-dim);
  position: relative;
  white-space: nowrap;
  transition: color var(--dur-fast) var(--ease-out);
  border: 2px solid transparent;
  border-radius: var(--radius-sm);
}
.tab-d.active {
  color: var(--blue);
  border-color: var(--blue);
  background: var(--blue-bg);
}
.tab-d:hover:not(.active) { color: var(--ink); }

/* Mobile: Bottom nav (hidden on desktop) */
.bottom-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: var(--card);
  border-top: 1px solid var(--line);
  padding: var(--space-1) 0 calc(var(--space-1) + env(safe-area-inset-bottom, 0));
  box-shadow: 0 -1px 8px rgba(0,0,0,0.04);
  justify-content: space-around;
}
.bottom-nav-inner {
  display: flex; justify-content: space-around;
  max-width: 500px; margin: 0 auto;
}
.nav-btn {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: var(--space-1) var(--space-2);
  font-size: 10px; font-weight: 500;
  color: var(--ink-faint);
  transition: color var(--dur-fast) var(--ease-out);
  min-width: 52px;
}
.nav-btn .nav-icon { font-size: 20px; line-height: 1; transition: transform var(--dur-fast) var(--ease-out); }
.nav-btn.active { color: var(--blue); }
.nav-btn.active .nav-icon { transform: translateY(-2px); }
.nav-btn:active .nav-icon { transform: scale(0.9); }

/* ============================================================
   Main Layout
   ============================================================ */
.main-layout {
  display: flex; gap: var(--space-6); align-items: flex-start;
}
.main-content { flex: 1; min-width: 0; }
.side-panel { width: 340px; flex-shrink: 0; }

/* ============================================================
   PHASE 2: Cards with Tear-line Separators
   ============================================================ */
.card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius-md);
  padding: var(--space-4);
  margin-bottom: var(--space-3);
  box-shadow: var(--shadow-sm);
  transition: box-shadow var(--dur-fast) var(--ease-out),
              background var(--dur-slow) var(--ease-out);
}
.card:hover { box-shadow: var(--shadow-md); }
.card-header {
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--ink-dim);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: var(--space-3);
  display: flex; align-items: center; justify-content: space-between;
  gap: var(--space-2);
}

/* Dotted tear-line between cards */
.tear-line {
  border: none;
  border-top: 2px dashed var(--line-dotted);
  margin: 0 var(--space-4);
  opacity: 0.6;
}

/* ============================================================
   PHASE 2: Input Area — Large Price Input with Glow
   ============================================================ */
.input-row {
  display: flex; gap: var(--space-2); align-items: center; flex-wrap: wrap;
}
.input-price {
  flex: 1;
  font-family: var(--font-mono); font-size: var(--text-xl); font-weight: 600;
  padding: var(--space-3) var(--space-4);
  background: var(--surface);
  border: 2px solid var(--line);
  border-radius: var(--radius-md);
  color: var(--ink);
  min-width: 120px;
  transition: border-color var(--dur-fast) var(--ease-out),
              box-shadow var(--dur-fast) var(--ease-out);
}
.input-price:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px var(--blue-bg);
  outline: none;
}
.input-price::placeholder {
  color: var(--ink-ghost); font-size: var(--text-base);
}

.category-select {
  font-family: var(--font-sans); font-size: var(--text-sm); font-weight: 500;
  padding: var(--space-2) var(--space-3);
  background: var(--surface); border: 2px solid var(--line);
  border-radius: var(--radius-md); color: var(--ink);
  min-width: 110px; cursor: pointer;
  transition: border-color var(--dur-fast) var(--ease-out);
}
.category-select:focus {
  border-color: var(--blue); outline: none;
  box-shadow: 0 0 0 3px var(--blue-bg);
}

/* PHASE 3: Number flip for profit preview */
.profit-preview {
  font-family: var(--font-mono); font-size: var(--text-sm); color: var(--green);
  white-space: nowrap; min-width: 60px; text-align: right;
  position: relative; overflow: hidden;
  height: 1.5em; line-height: 1.5em;
  transition: color var(--dur-fast) var(--ease-out);
}
.profit-preview.empty { color: var(--ink-ghost); }
.profit-preview .flip-container {
  display: inline-block; position: relative;
}
.profit-preview .flip-out {
  animation: flipOut var(--dur-fast) var(--ease-out) forwards;
}
.profit-preview .flip-in {
  animation: flipIn var(--dur-fast) var(--ease-out) forwards;
}
@keyframes flipOut {
  to { transform: translateY(-120%); opacity: 0; }
}
@keyframes flipIn {
  from { transform: translateY(120%); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.tier-preview {
  font-size: var(--text-xs); padding: 3px 8px; border-radius: var(--radius-sm);
  font-weight: 500; white-space: nowrap;
  background: var(--line); color: var(--ink-dim);
  transition: background var(--dur-fast) var(--ease-out),
              color var(--dur-fast) var(--ease-out);
}

.btn-add {
  font-family: var(--font-mono); font-size: var(--text-sm); font-weight: 600;
  padding: var(--space-3) var(--space-5);
  background: var(--ink); color: var(--paper);
  border-radius: var(--radius-md);
  white-space: nowrap;
  transition: opacity var(--dur-fast) var(--ease-out),
              transform var(--dur-fast) var(--ease-out);
}
.btn-add:active { transform: scale(0.97); }
.btn-add:disabled { opacity: 0.3; cursor: not-allowed; }

.no-match {
  font-size: var(--text-xs); color: var(--red);
  margin-top: var(--space-1);
  display: none;
}
.no-match.show { display: block; }

/* ============================================================
   PHASE 2: Category Badges — Ink Stamp Style
   ============================================================ */
.cat-badge {
  display: inline-block; font-size: 10px; padding: 2px 6px;
  border-radius: var(--radius-sm); font-weight: 600; white-space: nowrap;
  letter-spacing: 0.02em;
}
.cat-badge.kr-selfie { background: #FCE7F3; color: #9D174D; }
.cat-badge.polaroid { background: #E0F2FE; color: #075985; }
.cat-badge.id-photo { background: #FEF3C7; color: #92400E; }
.cat-badge.portrait { background: #EDE9FE; color: #5B21B6; }
.cat-badge.other { background: #F3F4F6; color: #374151; }
body.dark .cat-badge.kr-selfie { background: #4A1525; color: #F9A8D4; }
body.dark .cat-badge.polaroid { background: #0C2D48; color: #7DD3FC; }
body.dark .cat-badge.id-photo { background: #422006; color: #FCD34D; }
body.dark .cat-badge.portrait { background: #2E1065; color: #C4B5FD; }
body.dark .cat-badge.other { background: #2E2E2E; color: #9B9B9B; }
@media (prefers-color-scheme: dark) {
  .cat-badge.kr-selfie { background: #4A1525; color: #F9A8D4; }
  .cat-badge.polaroid { background: #0C2D48; color: #7DD3FC; }
  .cat-badge.id-photo { background: #422006; color: #FCD34D; }
  .cat-badge.portrait { background: #2E1065; color: #C4B5FD; }
  .cat-badge.other { background: #2E2E2E; color: #9B9B9B; }
}

.tier-badge {
  display: inline-block; font-size: 10px; padding: 2px 6px;
  border-radius: var(--radius-sm); font-weight: 600; white-space: nowrap;
}
.tier-badge.low { background: #D1FAE5; color: #065F46; }
.tier-badge.mid { background: #DBEAFE; color: #1E40AF; }
.tier-badge.high { background: #FEF3C7; color: #92400E; }
.tier-badge.ultra { background: #FEE2E2; color: #991B1B; }
body.dark .tier-badge.low { background: #064E3B; color: #6EE7B7; }
body.dark .tier-badge.mid { background: #1E3A5F; color: #93C5FD; }
body.dark .tier-badge.high { background: #422006; color: #FCD34D; }
body.dark .tier-badge.ultra { background: #4A1525; color: #FCA5A5; }
@media (prefers-color-scheme: dark) {
  .tier-badge.low { background: #064E3B; color: #6EE7B7; }
  .tier-badge.mid { background: #1E3A5F; color: #93C5FD; }
  .tier-badge.high { background: #422006; color: #FCD34D; }
  .tier-badge.ultra { background: #4A1525; color: #FCA5A5; }
}

/* ============================================================
   PHASE 2: Order List with Cumulative Line + VOID Stamp
   ============================================================ */
.order-list { }
.order-item {
  display: flex; align-items: center; gap: var(--space-2);
  padding: var(--space-2) 0;
  border-bottom: 1px solid var(--line);
  font-size: var(--text-sm);
  position: relative;
}
.order-item:last-child { border-bottom: none; }
.order-index {
  font-family: var(--font-mono); font-size: var(--text-xs); color: var(--ink-faint);
  min-width: 24px;
}
.order-revenue {
  font-family: var(--font-mono); font-weight: 600;
  min-width: 80px; text-align: right;
}
.order-profit {
  font-family: var(--font-mono); color: var(--green);
  min-width: 80px; text-align: right;
}
.order-cumulative-revenue {
  font-family: var(--font-mono); font-size: var(--text-xs); color: var(--ink-dim);
  min-width: 80px; text-align: right;
  padding-left: var(--space-2);
  border-left: 1px solid var(--line);
}
.order-cumulative-profit {
  font-family: var(--font-mono); font-size: var(--text-xs); color: var(--ink-dim);
  min-width: 80px; text-align: right;
}
.order-margin {
  font-family: var(--font-mono); font-size: var(--text-xs); color: var(--ink-faint);
  min-width: 50px; text-align: right;
}
.order-actions {
  display: flex; gap: 2px; align-items: center;
}
.order-delete {
  font-size: var(--text-base); color: var(--ink-faint); padding: var(--space-1) var(--space-2);
  border-radius: var(--radius-sm);
  transition: color var(--dur-fast) var(--ease-out);
}
.order-delete:hover { color: var(--red); }
.btn-refund {
  font-size: var(--text-xs); color: var(--ink-faint); padding: var(--space-1) var(--space-1);
  border-radius: var(--radius-sm);
  transition: color var(--dur-fast) var(--ease-out);
  font-family: var(--font-mono);
}
.btn-refund:hover { color: var(--orange); }

/* PHASE 2: VOID Stamp — rotated red overlay for refunds */
.order-item.voided {
  position: relative;
  opacity: 0.55;
}
.order-item.voided .order-revenue,
.order-item.voided .order-profit {
  text-decoration: line-through; color: var(--ink-faint);
}
.void-stamp {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%) rotate(-15deg);
  font-family: var(--font-serif); font-size: 18px; font-weight: 900;
  color: var(--stamp-red); opacity: 0.7;
  border: 2px solid var(--stamp-red); border-radius: var(--radius-sm);
  padding: 2px 8px; letter-spacing: 0.06em;
  pointer-events: none;
  animation: voidPopIn 300ms var(--ease-spring) forwards;
}
@keyframes voidPopIn {
  from { transform: translateY(-50%) rotate(-15deg) scale(0); opacity: 0; }
  to { transform: translateY(-50%) rotate(-15deg) scale(1); opacity: 0.7; }
}
.order-refund-tag {
  font-size: 10px; color: var(--orange); font-weight: 600;
  white-space: nowrap; min-width: 40px;
}

/* PHASE 3: Receipt print reveal for new orders */
@keyframes receiptPrint {
  from { clip-path: inset(0 100% 0 0); opacity: 0; }
  to { clip-path: inset(0 0 0 0); opacity: 1; }
}
.order-item.printing {
  animation: receiptPrint 200ms var(--ease-out) forwards;
}

/* ============================================================
   Daily Summary
   ============================================================ */
.daily-summary {
  display: flex; gap: var(--space-4); flex-wrap: wrap;
  padding-bottom: var(--space-3); margin-bottom: var(--space-2);
  border-bottom: 2px solid var(--ink);
}
.summary-item {
  display: flex; flex-direction: column; gap: 2px;
}
.summary-label {
  font-size: var(--text-xs); color: var(--ink-faint);
  text-transform: uppercase; letter-spacing: 0.06em;
}
.summary-value {
  font-family: var(--font-mono); font-size: var(--text-lg); font-weight: 600;
  color: var(--ink);
}
.summary-value.green { color: var(--green); }
.summary-value.red { color: var(--red); }

.cat-breakdown {
  display: flex; gap: var(--space-2); flex-wrap: wrap;
  padding-top: var(--space-2); margin-top: var(--space-2);
  border-top: 1px solid var(--line);
}
.cat-breakdown-item {
  font-size: var(--text-xs); color: var(--ink-dim);
  display: flex; gap: 4px; align-items: center;
}
.cat-breakdown-count {
  font-family: var(--font-mono); font-weight: 600; color: var(--ink);
}

/* ============================================================
   Side Panel — Stamp-style Auto Fields
   ============================================================ */
.panel-section-label {
  font-size: 11px; font-weight: 700; color: var(--ink-faint);
  text-transform: uppercase; letter-spacing: 0.08em;
  padding: var(--space-4) 0 var(--space-1);
}
.panel-section-label:first-child { padding-top: 0; }

.panel-metric {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 6px 0;
  border-bottom: 1px solid var(--line);
  font-size: var(--text-sm);
}
.panel-metric:last-child { border-bottom: none; }
.panel-label {
  color: var(--ink-dim); flex-shrink: 0; margin-right: var(--space-2);
}
.panel-value {
  font-family: var(--font-mono); font-size: var(--text-base); font-weight: 600;
  color: var(--ink); text-align: right;
}
.panel-value.highlight { color: var(--blue); font-size: var(--text-md); }
.panel-value.green { color: var(--green); }
.panel-value.red { color: var(--red); }

/* Panel editable input */
.panel-input {
  font-family: var(--font-mono); font-size: var(--text-sm);
  width: 90px; padding: var(--space-1) var(--space-2); text-align: right;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--radius-sm); color: var(--ink);
  transition: border-color var(--dur-fast) var(--ease-out);
}
.panel-input:focus { border-color: var(--blue); outline: none; }

/* Panel auto-calculated — "stamp" background */
.panel-auto {
  font-family: var(--font-mono); font-size: var(--text-sm); font-weight: 600;
  color: var(--ink); text-align: right;
  background: var(--paper-warm); padding: var(--space-1) var(--space-2);
  border-radius: var(--radius-sm); min-width: 70px; display: inline-block;
  border: 1px solid var(--line);
}

.panel-metric-hybrid {
  display: flex; justify-content: space-between; align-items: center;
  padding: 5px 0;
  border-bottom: 1px solid var(--line);
  font-size: var(--text-sm);
}
.panel-metric-hybrid:last-child { border-bottom: none; }

.panel-grid-2 {
  display: grid; grid-template-columns: 1fr 1fr; gap: 0;
  border-bottom: 1px solid var(--line);
}
.panel-grid-2 > :nth-child(even) {
  border-left: 2px solid var(--ink);
  padding-left: var(--space-2);
}
.panel-grid-2 > :nth-child(odd) {
  padding-right: var(--space-2);
}
.panel-col-header {
  font-size: var(--text-sm); font-weight: 700; color: var(--ink);
  padding: 6px 0; text-align: center;
  border-bottom: 1px solid var(--line);
  font-family: var(--font-serif); letter-spacing: 0.04em;
}

/* ============================================================
   Tables
   ============================================================ */
.data-table {
  width: 100%; border-collapse: collapse;
  font-family: var(--font-mono); font-size: var(--text-sm);
}
.data-table th {
  font-size: var(--text-xs); font-weight: 600; color: var(--ink-faint);
  text-transform: uppercase; letter-spacing: 0.06em;
  text-align: right; padding: var(--space-2) var(--space-3);
  border-bottom: 2px solid var(--ink);
}
.data-table th:first-child { text-align: left; }
.data-table td {
  padding: var(--space-2) var(--space-3); text-align: right;
  border-bottom: 1px solid var(--line); color: var(--ink);
}
.data-table td:first-child { text-align: left; color: var(--ink-dim); }
.data-table .profit-cell { color: var(--green); }
.data-table .total-row td {
  font-weight: 700; border-top: 2px solid var(--ink);
  border-bottom: none; font-size: var(--text-sm); padding-top: var(--space-3);
}
.cat-sub-table {
  width: 100%; border-collapse: collapse;
  font-family: var(--font-mono); font-size: var(--text-xs); margin-top: var(--space-2);
}
.cat-sub-table th {
  font-size: 10px; color: var(--ink-faint); text-transform: uppercase;
  letter-spacing: 0.05em; text-align: right; padding: 4px var(--space-2);
  border-bottom: 1px solid var(--line);
}
.cat-sub-table th:first-child { text-align: left; }
.cat-sub-table td {
  padding: 4px var(--space-2); text-align: right;
  border-bottom: 1px solid var(--line);
}
.cat-sub-table td:first-child { text-align: left; }

/* ============================================================
   Month View Toggle + Calendar
   ============================================================ */
.month-view-toggle {
  display: flex; gap: 0; margin-bottom: var(--space-3);
}
.month-view-btn {
  padding: 6px var(--space-4); font-size: var(--text-xs); font-weight: 500;
  color: var(--ink-dim); border: 1px solid var(--line); cursor: pointer;
  background: var(--card);
  transition: all var(--dur-fast) var(--ease-out);
}
.month-view-btn:first-child { border-radius: var(--radius-md) 0 0 var(--radius-md); }
.month-view-btn:last-child { border-radius: 0 var(--radius-md) var(--radius-md) 0; }
.month-view-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

/* PHASE 2: Calendar Heatmap */
.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; text-align: center;
}
.cal-header-cell {
  font-size: var(--text-xs); font-weight: 600; color: var(--ink-faint);
  padding: var(--space-2) 0 4px; text-transform: uppercase; letter-spacing: 0.05em;
}
.cal-cell {
  padding: 6px 2px; border-radius: var(--radius-sm);
  display: flex; flex-direction: column; justify-content: flex-start; align-items: center;
  min-height: 80px; cursor: default;
  transition: background var(--dur-slow) var(--ease-out);
}
.cal-cell.zero { background: transparent; }
.cal-cell.low-rev { background: #EDE8DC; }
.cal-cell.mid-rev { background: #DBD5C5; }
.cal-cell.high-rev { background: var(--blue-bg); color: var(--blue); }
.cal-cell.high-rev .cal-revenue { color: var(--blue); font-weight: 800; }
.cal-cell.high-rev .cal-profit { color: var(--green); font-weight: 700; }
.cal-cell.today { border: 2px solid var(--ink) !important; }
.cal-cell.empty { border-color: transparent; background: transparent; }
.cal-date {
  font-size: var(--text-sm); font-weight: 700; color: var(--ink); margin-bottom: 3px;
}
.cal-revenue { font-family: var(--font-mono); font-size: var(--text-sm); font-weight: 700; color: var(--blue); }
.cal-profit { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--green); margin-top: 1px; }

body.dark .cal-cell.low-rev { background: #2A2720; }
body.dark .cal-cell.mid-rev { background: #363128; }
body.dark .cal-cell.high-rev { background: var(--blue-bg); }
@media (prefers-color-scheme: dark) {
  .cal-cell.low-rev { background: #2A2720; }
  .cal-cell.mid-rev { background: #363128; }
  .cal-cell.high-rev { background: var(--blue-bg); }
}

/* ============================================================
   Inventory
   ============================================================ */
.inv-form-row {
  display: flex; gap: var(--space-2); align-items: center; flex-wrap: wrap;
  margin-bottom: var(--space-3);
}
.inv-form-row input {
  font-family: var(--font-mono); font-size: var(--text-sm);
  padding: var(--space-2) var(--space-3); background: var(--surface);
  border: 1px solid var(--line); border-radius: var(--radius-md);
  color: var(--ink); width: 100px;
}
.inv-form-row input:focus { border-color: var(--blue); outline: none; }
.inv-form-row input.name-input { width: 130px; font-family: var(--font-sans); }
.btn-inv {
  font-family: var(--font-mono); font-size: var(--text-xs); font-weight: 600;
  padding: var(--space-2) var(--space-3); border-radius: var(--radius-md);
  color: #fff; white-space: nowrap;
}
.btn-inv.add { background: var(--ink); }
.btn-inv.use { background: var(--orange); }
.btn-inv.buy { background: var(--green); }
.btn-inv.del { background: var(--red); font-size: 10px; padding: 4px var(--space-2); }
.inv-item {
  display: flex; align-items: center; gap: var(--space-2);
  padding: var(--space-2) 0; border-bottom: 1px solid var(--line);
  font-size: var(--text-sm); flex-wrap: wrap;
}
.inv-item:last-child { border-bottom: none; }
.inv-name { font-weight: 600; min-width: 80px; }
.inv-stock { font-family: var(--font-mono); font-size: var(--text-md); font-weight: 700; min-width: 50px; text-align: center; }
.inv-stock.low { color: var(--red); }
.inv-unit-price { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--ink-dim); min-width: 70px; }
.inv-today-use { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--orange); min-width: 70px; }
.inv-total-value { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--ink-dim); min-width: 80px; }
.inv-qty-input {
  font-family: var(--font-mono); font-size: var(--text-sm); width: 50px; padding: 4px 6px;
  text-align: center; background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--radius-sm); color: var(--ink);
}
.inv-qty-input:focus { border-color: var(--blue); outline: none; }
.inv-usage-log { font-size: var(--text-xs); color: var(--ink-faint); margin-top: 4px; }
.inv-daily-cost { font-family: var(--font-mono); font-size: var(--text-sm); color: var(--orange); padding: var(--space-2) 0; }

/* ============================================================
   Settings
   ============================================================ */
.settings-section { margin-bottom: var(--space-5); }
.settings-section h3 {
  font-family: var(--font-serif); font-size: var(--text-base); font-weight: 600;
  margin-bottom: var(--space-3);
  padding-bottom: var(--space-2); border-bottom: 1px solid var(--line);
}
.price-map-table {
  width: 100%; border-collapse: collapse;
  font-family: var(--font-mono); font-size: var(--text-sm);
}
.price-map-table th {
  font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--ink-faint); text-align: left; padding: 6px var(--space-2);
  border-bottom: 2px solid var(--ink);
}
.price-map-table td { padding: 6px var(--space-2); border-bottom: 1px solid var(--line); }
.price-map-table input {
  font-family: var(--font-mono); font-size: var(--text-sm);
  width: 80px; padding: 6px var(--space-2);
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--radius-sm); color: var(--ink);
}
.price-map-table input:focus { border-color: var(--blue); outline: none; }
.btn-sm {
  font-size: var(--text-sm); padding: 6px var(--space-3); border-radius: var(--radius-md);
  font-weight: 500; transition: opacity var(--dur-fast) var(--ease-out);
}
.btn-sm.add { background: var(--ink); color: var(--paper); }
.btn-sm.del { color: var(--red); }
.btn-sm.save { background: var(--ink); color: var(--paper); }

.params-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-2);
}
.param-item {
  display: flex; flex-direction: column; gap: 4px;
}
.param-label {
  font-size: var(--text-xs); color: var(--ink-faint);
  text-transform: uppercase; letter-spacing: 0.06em;
}
.param-input {
  font-family: var(--font-mono); font-size: var(--text-sm);
  padding: var(--space-2) var(--space-3);
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--radius-sm); color: var(--ink);
}
.param-input:focus { border-color: var(--blue); outline: none; }

.data-actions { display: flex; gap: var(--space-2); flex-wrap: wrap; }
.btn-action {
  font-family: var(--font-mono); font-size: var(--text-xs); font-weight: 500;
  padding: var(--space-2) var(--space-4); border-radius: var(--radius-md);
  border: 1px solid var(--line); color: var(--ink);
  transition: all var(--dur-fast) var(--ease-out);
}
.btn-action:hover { border-color: var(--ink); }
.btn-action.danger { color: var(--red); border-color: var(--red); }
.btn-action.danger:hover { background: var(--red); color: #fff; }

/* ============================================================
   Date Navigation
   ============================================================ */
.date-nav {
  display: flex; align-items: center; gap: 4px; margin-bottom: var(--space-4);
}
.date-nav-btn {
  font-size: var(--text-md); padding: var(--space-1) var(--space-2); color: var(--ink-dim);
  border-radius: var(--radius-sm);
  transition: color var(--dur-fast) var(--ease-out);
}
.date-nav-btn:hover { color: var(--ink); }
.date-nav-label {
  display: flex; align-items: center; gap: 4px;
  font-family: var(--font-mono); font-size: var(--text-base); font-weight: 600;
}
.date-nav-label input {
  font-family: var(--font-mono); font-size: var(--text-base); font-weight: 600;
  text-align: left; color: var(--ink);
  width: 200px; padding: 2px 6px;
  border: none; border-bottom: 1px dashed var(--line);
  border-radius: 0; background: transparent;
  -webkit-appearance: none;
}
.date-nav-label input::-webkit-datetime-edit { padding: 0; }
.date-nav-label input::-webkit-datetime-edit-fields-wrapper { padding: 0; }
.date-nav-label input::-webkit-calendar-picker-indicator { margin-left: 2px; }
.date-weekday {
  font-family: var(--font-sans); font-size: var(--text-sm); font-weight: 500;
  color: var(--ink-dim); white-space: nowrap;
}

.picker-row {
  display: flex; align-items: center; gap: var(--space-2); margin-bottom: var(--space-4);
}
.picker-select {
  font-family: var(--font-mono); font-size: var(--text-sm);
  padding: var(--space-2) var(--space-3);
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-md); color: var(--ink);
}

/* ============================================================
   Empty State with Thermal-receipt Illustration
   ============================================================ */
.empty-state {
  text-align: center; padding: var(--space-10) var(--space-5); color: var(--ink-faint);
}
.empty-state-icon { font-size: 40px; margin-bottom: var(--space-3); opacity: 0.5; }
.empty-state-text {
  font-family: var(--font-serif); font-size: var(--text-sm); line-height: 1.8;
}
.empty-state-hint {
  margin-top: var(--space-2); font-family: var(--font-mono); font-size: var(--text-xs);
  color: var(--ink-ghost);
}

/* ============================================================
   PHASE 3: Toast — Tear-off Receipt Strip
   ============================================================ */
.toast {
  position: fixed; bottom: calc(var(--nav-height) + var(--space-4) + env(safe-area-inset-bottom, 0px));
  left: 50%; transform: translateX(-50%) rotate(-1deg);
  font-family: var(--font-mono); font-size: var(--text-xs);
  padding: var(--space-2) var(--space-5); border-radius: var(--radius-sm);
  background: var(--ink); color: var(--paper);
  z-index: 200; opacity: 0; pointer-events: none;
  box-shadow: var(--shadow-lg);
}
.toast.show {
  animation: toastIn 250ms var(--ease-spring) forwards,
             toastStay 1400ms 250ms linear forwards,
             toastOut 200ms 1650ms var(--ease-out) forwards;
}
@keyframes toastIn {
  from { transform: translateX(-50%) translateY(20px) rotate(-1deg); opacity: 0; }
  to { transform: translateX(-50%) translateY(0) rotate(-1deg); opacity: 1; }
}
@keyframes toastStay {
  from, to { opacity: 1; }
}
@keyframes toastOut {
  to { transform: translateX(-50%) translateY(20px) rotate(1deg); opacity: 0; }
}

/* ============================================================
   PHASE 4: PWA Install Prompt
   ============================================================ */
.install-banner {
  position: fixed; bottom: calc(var(--nav-height) + var(--space-2) + env(safe-area-inset-bottom, 0px));
  left: var(--space-4); right: var(--space-4); z-index: 150;
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-lg); padding: var(--space-3) var(--space-4);
  box-shadow: var(--shadow-lg);
  display: flex; align-items: center; justify-content: space-between;
  gap: var(--space-3);
  animation: slideUp 300ms var(--ease-spring) forwards;
  max-width: 500px; margin: 0 auto;
}
@keyframes slideUp {
  from { transform: translateY(100%); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.install-banner-text { font-size: var(--text-xs); color: var(--ink-dim); }
.install-banner-btn {
  font-family: var(--font-mono); font-size: var(--text-xs); font-weight: 600;
  padding: var(--space-1) var(--space-3);
  background: var(--ink); color: var(--paper);
  border-radius: var(--radius-sm);
  white-space: nowrap;
}
.install-banner-close {
  font-size: var(--text-base); color: var(--ink-faint);
  padding: 0 var(--space-1);
}

/* ============================================================
   PHASE 5.2: Keyboard Shortcuts Panel
   ============================================================ */
.kb-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.3);
  display: none; align-items: center; justify-content: center;
}
.kb-overlay.show { display: flex; }
.kb-panel {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-lg); padding: var(--space-6);
  max-width: 380px; width: 90vw;
  box-shadow: var(--shadow-lg);
  animation: fadeScale 200ms var(--ease-spring) forwards;
}
@keyframes fadeScale {
  from { transform: scale(0.95); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.kb-panel h3 {
  font-family: var(--font-serif); font-size: var(--text-base); margin-bottom: var(--space-4);
  padding-bottom: var(--space-2); border-bottom: 2px dashed var(--line-dotted);
}
.kb-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: var(--space-1) 0;
  font-family: var(--font-mono); font-size: var(--text-xs);
}
.kb-key {

applyTheme(getThemePref());

// ============================================================

var CATEGORIES = [

};

var STORAGE_KEY = 'daily_reconciliation_v2';
var FILE_SYNC_DB = 'file_sync_db';
var FILE_SYNC_STORE = 'handles';
var DEMO_KEY = 'demo_data_loaded_v4';

// ============================================================
// File Sync Adapter (unchanged from v2)
// ============================================================
var dirHandle = null;
var fileSyncEnabled = false;

function openSyncDB() {
  return new Promise(function(resolve, reject) {
    var req = indexedDB.open(FILE_SYNC_DB, 1);
    req.onupgradeneeded = function() { req.result.createObjectStore(FILE_SYNC_STORE); };
    req.onsuccess = function() { resolve(req.result); };
    req.onerror = function() { reject(req.error); };
  });
}

async function storeDirHandle(handle) {
  var db = await openSyncDB();
  var tx = db.transaction(FILE_SYNC_STORE, 'readwrite');
  tx.objectStore(FILE_SYNC_STORE).put(handle, 'dirHandle');
  return new Promise(function(r) { tx.oncomplete = r; tx.onerror = r; });
}

async function getStoredDirHandle() {
  var db = await openSyncDB();
  var tx = db.transaction(FILE_SYNC_STORE, 'readonly');
  var req = tx.objectStore(FILE_SYNC_STORE).get('dirHandle');
  return new Promise(function(resolve, reject) {
    req.onsuccess = function() { resolve(req.result); };
    req.onerror = function() { reject(req.error); };
  });
}

async function initFileSync() {
  if (!('showDirectoryPicker' in window)) {
    updateSyncBadge(false);
    return;
  }
  try {
    dirHandle = await getStoredDirHandle();
    if (dirHandle) {
      var perm = await dirHandle.queryPermission({ mode: 'readwrite' });
      if (perm === 'granted') {
        fileSyncEnabled = true;
        updateSyncBadge(true);
        var fileData = await readFromFile();
        if (fileData && fileData.orders && fileData.priceMap && fileData.params) {
          var localData = readFromLocal();
          var fileCount = fileData.orders.length;
          var localCount = localData ? localData.orders.length : 0;
          if (fileCount >= localCount && fileCount > 0) return fileData;
        }
      } else {
        dirHandle = null;
        updateSyncBadge(false);
      }
    } else {
      updateSyncBadge(false);
    }
  } catch(e) { updateSyncBadge(false); }
  return null;
}

async function enableFileSync() {
  if (!('showDirectoryPicker' in window)) {
    toast('⚠ 浏览器不支持，请用 Chrome 或 Edge');
    return;
  }
  try {
    dirHandle = await window.showDirectoryPicker({ mode: 'readwrite', startIn: 'documents' });
    await storeDirHandle(dirHandle);
    await dirHandle.requestPermission({ mode: 'readwrite' });
    fileSyncEnabled = true;
    updateSyncBadge(true);
    await writeToFile(DATA);
    toast('✓ 文件同步已启用 → data.json');
  } catch(e) {
    if (e.name === 'AbortError') return;
    toast('⚠ 文件同步失败: ' + e.message);
  }
}

async function readFromFile() {
  if (!fileSyncEnabled || !dirHandle) return null;
  try {
    var fileHandle = await dirHandle.getFileHandle('data.json');
    var file = await fileHandle.getFile();
    var text = await file.text();
    var data = JSON.parse(text);
    if (data && data.orders && data.priceMap && data.params) return data;
  } catch(e) {}
  return null;
}

async function writeToFile(data) {
  if (!fileSyncEnabled || !dirHandle) return;
  try {
    var fileHandle = await dirHandle.getFileHandle('data.json', { create: true });
    var writable = await fileHandle.createWritable();
    await writable.write(JSON.stringify(data, null, 2));
    await writable.close();
  } catch(e) { console.warn('File write failed:', e.message); }
}

function readFromLocal() {
  try { var raw = localStorage.getItem(STORAGE_KEY); if (raw) return JSON.parse(raw); } catch(e) {}
  try {
    var oldRaw = localStorage.getItem('daily_reconciliation_data');
    if (oldRaw) {
      var oldData = JSON.parse(oldRaw);
      if (oldData.orders) {
        oldData.orders = oldData.orders.map(function(o) { return {
          id: o.id || (Date.now().toString(36)+Math.random().toString(36).slice(2,7)),
          date: o.date, revenue: o.revenue, profit: o.profit,
          category: o.category || '其他',
          priceTier: o.priceTier || getPriceTierObj(o.revenue).label,
          refunded: o.refunded || false
        };});
      }
      return oldData;
    }
  } catch(e) {}
  return null;
}

function updateSyncBadge(active) {
  var el = document.getElementById('syncBadge');
  if (!el) return;
  if (active) {
    el.className = 'sync-badge active';
    el.innerHTML = '[PRINTED]';
    el.onclick = null;
    el.title = '数据保存到 data.json + 浏览器';
  } else {
    el.className = 'sync-badge inactive';
    el.innerHTML = '[DIGITAL]';
    el.onclick = enableFileSync;
    el.title = '点击启用文件同步 → data.json';
  }
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  if (fileSyncEnabled) writeToFile(data);
}

function loadData() { return readFromLocal(); }

async function loadDataAsync() {
  var fileData = await initFileSync();
  if (fileData) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(fileData));
    return fileData;
  }
  return readFromLocal();
}

function initData() {
  return {
    orders: [],
    priceMap: DEFAULT_PRICE_MAP.slice(),
    params: Object.assign({}, DEFAULT_PARAMS),
    inventory: []
  };
}

var DATA = null;

// ============================================================
// PHASE 5.1: Demo Data Generator
// ============================================================
function generateDemoData() {
  // Deterministic seeded random — same demo data every time
  var seed = 20260613;
  function seededRandom() {
    seed = (seed * 16807) % 2147483647;
    return (seed - 1) / 2147483646;
  }
  function pick(arr) { return arr[Math.floor(seededRandom() * arr.length)]; }

  var orders = [];
  var catKeys = ['韩式自拍','拍立得','证件照','写真照','其他'];
  var now = new Date();
  for (var d = 29; d >= 0; d--) {
    var dt = new Date(now);
    dt.setDate(dt.getDate() - d);
    var ds = dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
    var dayOfWeek = dt.getDay();
    var maxOrders = (dayOfWeek === 0 || dayOfWeek === 6) ? 2 : 6;
    var nOrders = Math.floor(seededRandom() * maxOrders) + 1;
    for (var i = 0; i < nOrders; i++) {
      var cat = pick(catKeys);
      var pm = pick(DEFAULT_PRICE_MAP);
      var isRefund = seededRandom() < 0.08;
      orders.push({
        id: 'demo_'+ds+'_'+i,
        date: ds,
        revenue: pm.price,
        profit: pm.profit,
        category: cat,
        priceTier: getPriceTierObj(pm.price).label,
        refunded: isRefund
      });
    }
  }
  orders.sort(function(a,b) {
    if (a.date !== b.date) return a.date.localeCompare(b.date);
    return a.id.localeCompare(b.id);
  });
  return orders;
}

function injectDemoIfNeeded(data) {
  if (data.orders.length > 0) return data; // already has real data
  if (localStorage.getItem(DEMO_KEY)) return data; // demo already shown before
  var demoOrders = generateDemoData();
  data.orders = demoOrders;
  localStorage.setItem(DEMO_KEY, '1');
  saveData(data);
  console.log('%c📦 Demo data loaded: ' + demoOrders.length + ' orders across 30 days',
    'color:#888;font-style:italic');
  return data;
}

// ============================================================
// Boot
// ============================================================
async function boot() {
  var saved = await loadDataAsync();
  if (saved && saved.orders && saved.priceMap && saved.params) {
    var migrated = false;
    saved.orders.forEach(function(o) {
      if (o.category === undefined) { o.category = '其他'; migrated = true; }
      if (o.priceTier === undefined) { o.priceTier = getPriceTierObj(o.revenue).label; migrated = true; }
      if (o.refunded === undefined) { o.refunded = false; migrated = true; }
    });
    if (saved.inventory === undefined) { saved.inventory = []; migrated = true; }
    if (migrated) saveData(saved);
  } else {
    saved = initData();
  }
  // Inject demo data on first launch (with no real data)
  saved = injectDemoIfNeeded(saved);
  DATA = saved;
  panelParams = loadPanelParams();
  updateHeaderDate();
  renderToday();
  renderPanel();
  setInterval(updateHeaderDate, 30000);
  // Hide splash after render
  setTimeout(function() {
    var splash = document.getElementById('splash');
    if (splash) { splash.classList.add('hide'); }
  }, 600);
}

// ============================================================
function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }

function fmt(n) {
  if (n == null || isNaN(n)) return '—';
  return Number(n).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtInt(n) {
  if (n == null || isNaN(n)) return '—';
  return Number(n).toLocaleString('zh-CN', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
function fmtPct(n) {
  if (n == null || isNaN(n)) return '—';
  return (n * 100).toFixed(1) + '%';
}
function todayStr() {
  var d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function uid() {
  return Date.now().toString(36)+Math.random().toString(36).slice(2,7);
}
function toast(msg) {
  var t = $('#toast');
  t.textContent = msg;
  t.classList.remove('show');
  void t.offsetWidth; // force reflow
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.classList.remove('show'); }, 2000);
}

// ============================================================
// Category / Price Helpers
// ============================================================
function getCatInfo(value) {
  for (var i=0;i<CATEGORIES.length;i++) if(CATEGORIES[i].value===value) return CATEGORIES[i];
  return CATEGORIES[4];
}
function getPriceTierObj(revenue) {
  for (var i=0;i<PRICE_TIERS.length;i++) if(revenue<=PRICE_TIERS[i].max) return PRICE_TIERS[i];
  return PRICE_TIERS[PRICE_TIERS.length-1];
}
function getPriceTierLabel(revenue) { return getPriceTierObj(revenue).label; }
function getProfit(price) {
  var num = parseFloat(price);
  if (isNaN(num)) return null;
  for (var i=0;i<DATA.priceMap.length;i++) {
    if (Math.abs(DATA.priceMap[i].price-num)<0.001) return DATA.priceMap[i].profit;
  }
  return null;
}

// ============================================================
// Order CRUD
// ============================================================
function addOrder(date, revenue, category) {
  var profit = getProfit(revenue);
  if (profit === null) return null;
  var tier = getPriceTierObj(parseFloat(revenue));
  DATA.orders.push({
    id: uid(), date: date,
    revenue: parseFloat(revenue), profit: profit,
    category: category || '其他',
    priceTier: tier.label, refunded: false
  });
  // Clear demo data on first real entry
  if (localStorage.getItem(DEMO_KEY)) {
    localStorage.removeItem(DEMO_KEY);
    console.log('%c📦 Demo data cleared — first real order entered', 'color:#888');
  }
  saveData(DATA);
  return profit;
}
function deleteOrder(id) {
  DATA.orders = DATA.orders.filter(function(o) { return o.id !== id; });
  saveData(DATA);
}
function refundOrder(id) {
  var order = DATA.orders.find(function(o) { return o.id === id; });
  if (!order) return;
  if (order.refunded) { toast('该订单已退款'); return; }
  if (!confirm('确认退款 ¥'+fmt(order.revenue)+'？退款后不计入汇总统计。')) return;
  order.refunded = true;
  saveData(DATA);
  toast('🔙 已退款 ¥'+fmt(order.revenue));
  refresh();
}
function getDayOrders(date) {
  return DATA.orders.filter(function(o) { return o.date===date; }).sort(function(a,b) {
    return a.id.localeCompare(b.id);
  });
}
function getDayActiveOrders(date) {
  return getDayOrders(date).filter(function(o) { return !o.refunded; });
}
function getMonthOrders(year, month) {
  var prefix = year+'-'+String(month).padStart(2,'0');
  return DATA.orders.filter(function(o) { return o.date.startsWith(prefix); });
}
function getMonthActiveOrders(year, month) {
  return getMonthOrders(year, month).filter(function(o) { return !o.refunded; });
}
function getYearOrders(year) {
  return DATA.orders.filter(function(o) { return o.date.startsWith(String(year)); });
}
function getYearActiveOrders(year) {
  return getYearOrders(year).filter(function(o) { return !o.refunded; });
}
function getAllActiveOrders() {
  return DATA.orders.filter(function(o) { return !o.refunded; });
}

var panelParams = Object.assign({}, DEFAULT_PARAMS);

function loadPanelParams() {
  try {
    var saved = localStorage.getItem('daily_panel_params_v2');
    if (saved) {
      var pp = JSON.parse(saved);
      if (pp.rent===0 && pp.labor===0 && pp.energy===0 && DATA && DATA.params) {
        if (DATA.params.rent>0||DATA.params.labor>0||DATA.params.energy>0) return Object.assign({}, DATA.params);
      }
      return pp;
    }
  } catch(e) {}
  if (DATA) return Object.assign({}, DATA.params);
  return Object.assign({}, DEFAULT_PARAMS);
}
function savePanelParams() { localStorage.setItem('daily_panel_params_v2', JSON.stringify(panelParams)); }
function syncPanelFromSettings() {
  panelParams = Object.assign({}, DATA.params);
  savePanelParams();
  renderPanel();
  toast('✓ 面板已同步设置数据');
}

function calcPanelMetrics() {
  var p = panelParams;
  var active, operatingDays;
  if (activeTab === 'today') {
    active = getDayActiveOrders(currentDate);
    operatingDays = active.length > 0 ? 1 : 0;
  } else if (activeTab === 'month') {
    active = getMonthActiveOrders(currentMonth.year, currentMonth.month);
    var ad = new Set(active.map(function(o){return o.date;}));
    operatingDays = ad.size;
  } else {
    active = getAllActiveOrders();
    var ad = new Set(active.map(function(o){return o.date;}));
    operatingDays = ad.size;
  }
  var totalRevenue = active.reduce(function(s,o){return s+o.revenue;},0);
  var totalProfit = active.reduce(function(s,o){return s+o.profit;},0);
  var monthlyFixed = p.rent+p.labor+p.energy+p.otherFixed;
  var dailyFixed = p.businessDays>0 ? monthlyFixed/p.businessDays : 0;
  var dailyBreakEven = p.businessDays>0&&p.grossMargin>0 ? Math.round((dailyFixed/p.grossMargin)*100)/100 : 0;
  var fixedCostTotal = p.purchaseCost+p.laborCost+p.energyCost+p.marketingCost;
  var dailyBreakEven2 = p.monthlyBusinessDays>0&&p.grossMargin>0 ? Math.round(fixedCostTotal/(p.monthlyBusinessDays*p.grossMargin)*100)/100 : 0;
  var periodSafeTotal = dailyBreakEven2*p.monthlyBusinessDays;
  var monthlyRevenue = p.dailyRevenue*p.monthlyBusinessDays;
  var monthlyNetProfit = monthlyRevenue*p.grossMargin-fixedCostTotal;
  var paybackMonths = monthlyNetProfit>0 ? fixedCostTotal/monthlyNetProfit : Infinity;
  var todayActive = getDayActiveOrders(currentDate);
  var todayRevenue = todayActive.reduce(function(s,o){return s+o.revenue;},0);
  var todayProfit = todayActive.reduce(function(s,o){return s+o.profit;},0);
  var todayNetProfit = todayProfit-dailyFixed;
  var todayMargin = todayRevenue>0 ? todayProfit/todayRevenue : 0;
  var monthActive = getMonthActiveOrders(currentMonth.year, currentMonth.month);
  var monthRevenue = monthActive.reduce(function(s,o){return s+o.revenue;},0);
  var monthProfit = monthActive.reduce(function(s,o){return s+o.profit;},0);
  var monthNetProfit = monthProfit-monthlyFixed;
  var monthMargin = monthRevenue>0 ? monthProfit/monthRevenue : 0;
  var actualMargin = totalRevenue>0 ? totalProfit/totalRevenue : 0;
  var actualNetProfit = totalProfit-dailyFixed*operatingDays;
  var todayInventoryCost = getTodayInventoryUsage();
  var todayNetAfterInventory = todayNetProfit-todayInventoryCost;
  return {
    totalRevenue:totalRevenue, totalProfit:totalProfit, todayNetProfit:todayNetProfit,
    monthNetProfit:monthNetProfit, actualMargin:actualMargin, actualNetProfit:actualNetProfit,
    monthlyFixed:monthlyFixed, dailyFixed:dailyFixed, dailyBreakEven:dailyBreakEven,
    fixedCostTotal:fixedCostTotal, dailyBreakEven2:dailyBreakEven2, periodSafeTotal:periodSafeTotal,
    monthlyRevenue:monthlyRevenue, monthlyNetProfit:monthlyNetProfit, paybackMonths:paybackMonths,
    todayInventoryCost:todayInventoryCost, todayNetAfterInventory:todayNetAfterInventory,
    todayRevenue:todayRevenue, todayProfit:todayProfit, todayMargin:todayMargin,
    monthRevenue:monthRevenue, monthProfit:monthProfit, monthMargin:monthMargin
  };
}

        '</div>' :
        '<div class="order-list">'+orderRows+'</div>')+
    '</div>';

  var savedInput = sessionStorage.getItem('pending_price_input');
  if (savedInput) {
    $('#priceInput').value = savedInput;
    onPriceInput(savedInput);
    sessionStorage.removeItem('pending_price_input');
  }
}

function onCatChange(val) { selectedCategory = val; }

function onPriceInput(val) {
  var num = parseFloat(val);
  var preview = $('#profitPreview');
  var btn = $('#btnAdd');
  var noMatch = $('#noMatch');
  var tierEl = $('#tierPreview');
  if (!preview) return;

  if (isNaN(num) || num <= 0) {
    preview.textContent = '利润 —';
    preview.classList.add('empty');
    if (btn) btn.disabled = true;
    if (noMatch) noMatch.classList.remove('show');
    if (tierEl) tierEl.textContent = '—';
    return;
  }
  var tier = getPriceTierObj(num);
  if (tierEl) {
    tierEl.textContent = '💰 '+tier.label;
    tierEl.style.background = tier.cssClass==='low'?'#D1FAE5':tier.cssClass==='mid'?'#DBEAFE':tier.cssClass==='high'?'#FEF3C7':'#FEE2E2';
    tierEl.style.color = tier.cssClass==='low'?'#065F46':tier.cssClass==='mid'?'#1E40AF':tier.cssClass==='high'?'#92400E':'#991B1B';
  }
  var profit = getProfit(num);
  if (profit !== null) {
    // Number flip animation
    var oldText = preview.textContent;
    var newText = '+¥'+fmt(profit);
    if (oldText !== newText && oldText !== '利润 —') {
      preview.innerHTML = '<span class="flip-container"><span class="flip-out">'+oldText+'</span></span>'+
                          '<span class="flip-container"><span class="flip-in">'+newText+'</span></span>';
      setTimeout(function(){ preview.textContent = newText; }, 120);
    } else {
      preview.textContent = newText;
    }
    preview.classList.remove('empty');
    if (btn) btn.disabled = false;
    if (noMatch) noMatch.classList.remove('show');
  } else {
    preview.textContent = '未匹配';
    preview.classList.add('empty');
    if (btn) btn.disabled = true;
    if (noMatch) noMatch.classList.add('show');
  }
}

function onPriceKeydown(e) { if (e.key==='Enter') submitOrder(); }

function submitOrder() {
  var input = $('#priceInput');
  if (!input) return;
  var val = parseFloat(input.value);
  if (isNaN(val)||val<=0) return;
  var cat = selectedCategory;
  var profit = addOrder(currentDate, val, cat);
  if (profit===null) { toast('未找到价格映射，请先在设置中添加'); return; }
  var tier = getPriceTierLabel(val);
  var catInfo = getCatInfo(cat);
  toast('✓ '+catInfo.icon+' ¥'+fmt(val)+' → 利润 ¥'+fmt(profit)+' · '+tier);
  input.value = '';
  refresh();
  setTimeout(function() {
    var newInput = $('#priceInput');
    if (newInput) { newInput.focus(); onPriceInput(''); }
  }, 50);
}

function removeOrder(id) {
  if (!confirm('删除这条订单记录？')) return;
  deleteOrder(id);
  toast('已删除');
  refresh();
}

var currentMonth = { year: new Date().getFullYear(), month: new Date().getMonth()+1 };
var monthView = 'calendar';

function renderMonth() {
  var prefix = currentMonth.year+'-'+String(currentMonth.month).padStart(2,'0');
  var allOrders = DATA.orders.filter(function(o){return o.date.startsWith(prefix);});
  var activeOrders = allOrders.filter(function(o){return !o.refunded;});

  var dayMap = {};
  activeOrders.forEach(function(o) {
    if (!dayMap[o.date]) dayMap[o.date]={revenue:0,profit:0,count:0,cats:{}};
    dayMap[o.date].revenue+=o.revenue;
    dayMap[o.date].profit+=o.profit;
    dayMap[o.date].count++;
    if (!dayMap[o.date].cats[o.category]) dayMap[o.date].cats[o.category]=0;
    dayMap[o.date].cats[o.category]++;
  });

  var days = Object.keys(dayMap).sort();

    var dm = dayMap[d];

  }).join('');

  var monthMargin = totalRevenue>0?totalProfit/totalRevenue:0;

  var monthCatMap = {};
  activeOrders.forEach(function(o) {
    if (!monthCatMap[o.category]) monthCatMap[o.category]={count:0,revenue:0,profit:0};

    monthCatMap[o.category].revenue+=o.revenue;
    monthCatMap[o.category].profit+=o.profit;
  });
  var catRows = Object.entries(monthCatMap).map(function(e) {
    var cat=e[0], d=e[1], info=getCatInfo(cat);

function renderMonthCalendar() {
  var prefix = currentMonth.year+'-'+String(currentMonth.month).padStart(2,'0');
  var activeOrders = DATA.orders.filter(function(o){return o.date.startsWith(prefix)&&!o.refunded;});
  var dayMap={}, dayCount={};
  activeOrders.forEach(function(o) {
    if(!dayMap[o.date]){dayMap[o.date]={revenue:0,profit:0};dayCount[o.date]=0;}
    dayMap[o.date].revenue+=o.revenue;
    dayMap[o.date].profit+=o.profit;
    dayCount[o.date]++;
  });

  var year=currentMonth.year, month=currentMonth.month;
  var firstDay=new Date(year,month-1,1).getDay();
  var daysInMonth=new Date(year,month,0).getDate();
  var weekHeaders=['日','一','二','三','四','五','六'];

  // Find max revenue for heatmap scale
  var maxRev = 0;
  Object.values(dayMap).forEach(function(d){if(d.revenue>maxRev)maxRev=d.revenue;});

  var cells = weekHeaders.map(function(d){return'<div class="cal-header-cell">'+d+'</div>';}).join('');
  for(var i=0;i<firstDay;i++) cells+='<div class="cal-cell empty"></div>';

  var today = todayStr();
  for(var d=1;d<=daysInMonth;d++) {
    var ds=year+'-'+String(month).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var dd=dayMap[ds];
    var rev=dd?dd.revenue:0;
    var isToday=ds===today;
    var heatClass='zero';
    if (rev>0&&maxRev>0) {
      var ratio=rev/maxRev;
      if(ratio>0.66)heatClass='high-rev';
      else if(ratio>0.33)heatClass='mid-rev';
      else heatClass='low-rev';
    }
    cells+='<div class="cal-cell '+heatClass+(isToday?' today':'')+'">'+
      '<span class="cal-date">'+d+'</span>'+
      (dd?'<span class="cal-revenue">¥'+fmtInt(rev)+'</span><span class="cal-profit">+¥'+fmtInt(dd.profit)+'</span>':'')+
      '</div>';
  }

  var totalRevenue=activeOrders.reduce(function(s,o){return s+o.revenue;},0);
  var totalProfit=activeOrders.reduce(function(s,o){return s+o.profit;},0);
  var operatingDays=Object.keys(dayMap).length;
  var monthlyFixed=panelParams.rent+panelParams.labor+panelParams.energy+(panelParams.otherFixed||0);
  var netProfit=totalProfit-monthlyFixed;
  var margin=totalRevenue>0?totalProfit/totalRevenue:0;

  return '<div class="card">'+
    '<div class="card-header">📅 '+year+'年'+month+'月 日历视图</div>'+
    '<div class="cal-grid" style="margin-top:8px">'+cells+'</div>'+
    '<div class="daily-summary" style="margin-top:12px;border-bottom:none;border-top:2px solid var(--ink);padding-top:12px;padding-bottom:0">'+
      '<div class="summary-item"><span class="summary-label">日历天数</span><span class="summary-value" style="font-size:18px">'+daysInMonth+' 天</span></div>'+
      '<div class="summary-item"><span class="summary-label">营业天数</span><span class="summary-value" style="font-size:18px">'+operatingDays+' 天</span></div>'+
      '<div class="summary-item"><span class="summary-label">出勤率</span><span class="summary-value" style="font-size:18px">'+(operatingDays/daysInMonth*100).toFixed(0)+'%</span></div>'+
      '<div class="summary-item"><span class="summary-label">订单数</span><span class="summary-value" style="font-size:18px">'+activeOrders.length+' 单</span></div>'+
      '<div class="summary-item"><span class="summary-label">收款</span><span class="summary-value" style="font-size:18px">¥'+fmt(totalRevenue)+'</span></div>'+
      '<div class="summary-item"><span class="summary-label">利润</span><span class="summary-value green" style="font-size:18px">¥'+fmt(totalProfit)+'</span></div>'+
      '<div class="summary-item"><span class="summary-label">净利润</span><span class="summary-value" style="font-size:18px;color:'+(netProfit>=0?'var(--green)':'var(--red)')+'">¥'+fmt(netProfit)+'</span></div>'+
      '<div class="summary-item"><span class="summary-label">利润率</span><span class="summary-value" style="font-size:18px">'+fmtPct(margin)+'</span></div>'+
    '</div>'+
  '</div>';
}

      monthData[m].cats[o.category].profit+=o.profit;

  var avgMonthlyRevenue=activeMonths>0?grandRevenue/activeMonths:0;

    return'<tr><td><span class="cat-badge '+info.cssClass+'">'+info.icon+' '+cat+'</span></td><td>'+d.count+'</td><td>¥'+fmt(d.revenue)+'</td><td>'+fmtPct(pct)+'</td><td class="profit-cell">¥'+fmt(d.profit)+'</td></tr>';

  $('#mainContent').innerHTML =

      '<select class="picker-select" id="summaryYearSelect" onchange="onSummaryYearChange()">'+yearOpts+'</select>'+
    '</div>'+
    '<div class="card">'+
      '<div class="card-header">📈 '+currentSummaryYear+'年 月度统计'+
        (refundedCount>0?' <span style="font-weight:400;font-size:12px;color:var(--orange)">'+refundedCount+' 单已退款不计入</span>':'')+

      '<table class="data-table">'+
