function addInventoryItem(name, unitPrice, initStock) {
  var item = {
    id: uid(), name: name,
    unitPrice: parseFloat(unitPrice)||0,
    currentStock: parseInt(initStock)||0,
    usage: [], restock: []
  };
  DATA.inventory.push(item);
  saveData(DATA);
  return item;
}
function useInventoryItem(id, qty) {
  var item = DATA.inventory.find(function(i){return i.id===id;});
  if(!item||qty<=0) return false;
  if(qty>item.currentStock) return false;
  item.currentStock-=qty;
  item.usage.push({date:todayStr(),qty:qty});
  saveData(DATA);
  return true;
}
function restockInventoryItem(id, qty, unitPrice) {
  var item = DATA.inventory.find(function(i){return i.id===id;});
  if(!item||qty<=0) return false;
  item.currentStock+=qty;
  if(unitPrice&&unitPrice>0) item.unitPrice=parseFloat(unitPrice);
  item.restock.push({date:todayStr(),qty:qty,totalCost:qty*(unitPrice||item.unitPrice)});
  saveData(DATA);
  return true;
}
function deleteInventoryItem(id) {
  DATA.inventory = DATA.inventory.filter(function(i){return i.id!==id;});
  saveData(DATA);
}
function getTodayInventoryUsage() {
  var d=todayStr(), totalCost=0;
  DATA.inventory.forEach(function(item) {
    var todayUsage=item.usage.filter(function(u){return u.date===d;}).reduce(function(s,u){return s+u.qty;},0);
    totalCost+=todayUsage*item.unitPrice;
  });
  return totalCost;
}

function renderInventory() {
  var items=DATA.inventory, todayCost=getTodayInventoryUsage();
  var itemRows=items.map(function(item) {
    var todayUse=item.usage.filter(function(u){return u.date===todayStr();}).reduce(function(s,u){return s+u.qty;},0);
    var totalValue=item.currentStock*item.unitPrice;
    var isLow=item.currentStock<=5;
    return '<div class="inv-item">'+
      '<span class="inv-name">'+item.name+'</span>'+
      '<span class="inv-unit-price">@¥'+fmt(item.unitPrice)+'/件</span>'+
      '<span class="inv-stock'+(isLow?' low':'')+'">'+item.currentStock+'</span>'+
      '<span style="font-size:12px;color:var(--ink-faint)">件</span>'+
      (todayUse>0?'<span class="inv-today-use">今日用 '+todayUse+' 件</span>':'')+
      '<span class="inv-total-value">库存值 ¥'+fmt(totalValue)+'</span>'+
      '<input type="number" class="inv-qty-input" id="use_qty_'+item.id+'" placeholder="数量" min="1" value="1" style="width:45px">'+
      '<button class="btn-inv use" onclick="doUseItem(\''+item.id+'\')">用掉</button>'+
      '<input type="number" class="inv-qty-input" id="buy_qty_'+item.id+'" placeholder="数量" min="1" style="width:45px">'+
      '<input type="number" class="inv-qty-input" id="buy_price_'+item.id+'" placeholder="单价" step="0.01" value="'+item.unitPrice+'" style="width:65px">'+
      '<button class="btn-inv buy" onclick="doBuyItem(\''+item.id+'\')">进货</button>'+
      '<button class="btn-inv del" onclick="doDeleteItem(\''+item.id+'\')">删</button>'+
    '</div>';
  }).join('');

  var recentUsage={};
  DATA.inventory.forEach(function(item) {
    item.usage.forEach(function(u) {
      if(!recentUsage[u.date]) recentUsage[u.date]=[];
      recentUsage[u.date].push({name:item.name,qty:u.qty,cost:u.qty*item.unitPrice});
    });
  });
  var sortedDates=Object.keys(recentUsage).sort().reverse().slice(0,7);
  var usageLogHTML=sortedDates.length>0 ?
    '<div style="margin-top:12px"><div class="card-header">📋 最近用量记录</div>'+
      sortedDates.map(function(d) {
        return '<div class="inv-usage-log"><strong>'+d+'</strong>：'+
          recentUsage[d].map(function(u){return u.name+' ×'+u.qty+'（¥'+fmt(u.cost)+'）';}).join('、')+
        '</div>';
      }).join('')+
    '</div>' : '';

  $('#mainContent').innerHTML =
    '<div class="card">'+
      '<div class="card-header">＋ 新增物品</div>'+
      '<div class="inv-form-row">'+
        '<input type="text" class="name-input" id="newItemName" placeholder="物品名称">'+
        '<input type="number" id="newItemPrice" placeholder="单价" step="0.01" value="0">'+
        '<input type="number" id="newItemStock" placeholder="初始库存" value="0">'+
        '<button class="btn-inv add" onclick="doAddItem()">＋ 添加</button>'+
      '</div>'+
    '</div>'+
    '<div class="card">'+
      '<div class="card-header">📦 库存清单 <span style="font-weight:400;font-size:12px">共 '+items.length+' 种</span></div>'+
      (items.length===0?'<div class="empty-state"><div class="empty-state-icon">📦</div><div class="empty-state-text">暂无物品</div><div class="empty-state-hint">在上方添加物品开始管理库存</div></div>':itemRows)+
      (todayCost>0?'<div class="inv-daily-cost">💡 今日物料成本：¥'+fmt(todayCost)+'（已同步到右侧仪表盘）</div>':'')+
      usageLogHTML+
    '</div>';
}

function doAddItem() {
  var name=$('#newItemName').value.trim();
  var price=parseFloat($('#newItemPrice').value);
  var stock=parseInt($('#newItemStock').value);
  if(!name){toast('请输入物品名称');return;}
  if(isNaN(price)||price<0){toast('请输入有效单价');return;}
  if(isNaN(stock)||stock<0){toast('请输入有效库存');return;}
  addInventoryItem(name,price,stock);
  toast('✓ 已添加 '+name);
  renderInventory(); renderPanel();
}
function doUseItem(id) {
  var qty=parseInt($('#use_qty_'+id).value);
  if(isNaN(qty)||qty<=0){toast('请输入有效数量');return;}
  if(!useInventoryItem(id,qty)){toast('库存不足');return;}
  toast('✓ 已记录用量');
  renderInventory(); renderPanel();
}
function doBuyItem(id) {
  var qty=parseInt($('#buy_qty_'+id).value);
  var price=parseFloat($('#buy_price_'+id).value);
  if(isNaN(qty)||qty<=0){toast('请输入有效数量');return;}
  restockInventoryItem(id,qty,price);
  toast('✓ 已进货 +'+qty+' 件');
  renderInventory(); renderPanel();
}
function doDeleteItem(id) {
  var item=DATA.inventory.find(function(i){return i.id===id;});
  if(!confirm('删除「'+item.name+'」？'+(item.currentStock>0?' 当前库存 '+item.currentStock+' 件。':''))) return;
  deleteInventoryItem(id);
  toast('已删除');
  renderInventory(); renderPanel();
}

// ============================================================
// Settings
// ============================================================
function renderSettings() {
  var sortedMap=DATA.priceMap.slice().sort(function(a,b){return a.price-b.price;});
  var mapRows=sortedMap.map(function(p){
    return'<tr><td><input type="number" value="'+p.price+'" step="0.01" data-field="price" data-old="'+p.price+'" onchange="onPriceMapChange(this)"></td>'+
      '<td><input type="number" value="'+p.profit+'" step="0.01" data-field="profit" data-old="'+p.price+'" onchange="onPriceMapChange(this)"></td>'+
      '<td>'+fmtPct(p.price>0?p.profit/p.price:0)+'</td>'+
      '<td><button class="btn-sm del" onclick="deletePriceMap('+p.price+')">删除</button></td></tr>';
  }).join('');

  var paramDefs=[
    ['rent','房租（月度）'],['labor','人工（月度）'],['energy','能源（月度）'],
    ['otherFixed','其他杂项（月度）'],['businessDays','本月已营业天数'],
    ['purchaseCost','进货成本'],['laborCost','人工成本'],
    ['energyCost','能源成本'],['marketingCost','营销费用'],
    ['dailyRevenue','日营业额（基准）'],['monthlyBusinessDays','月营业天数'],
    ['grossMargin','毛利率 (0-1)'],['taxRate','营业税率 (0-1)']
  ];
  var paramRows=paramDefs.map(function(e){
    var key=e[0],label=e[1];
    return'<div class="param-item"><label class="param-label">'+label+'</label>'+
      '<input type="number" class="param-input" id="param_'+key+'" value="'+DATA.params[key]+'" step="'+(key==='grossMargin'||key==='taxRate'?'0.01':'1')+'" onchange="onParamChange(\''+key+'\', this.value)"></div>';
  }).join('');

  var totalOrders=DATA.orders.length;
  var refundedOrders=DATA.orders.filter(function(o){return o.refunded;}).length;
  var activeOrders=totalOrders-refundedOrders;

  $('#mainContent').innerHTML =
    '<div class="settings-section">'+
      '<h3>💰 价格 → 利润映射表</h3>'+
      '<table class="price-map-table">'+
        '<thead><tr><th>售价</th><th>利润</th><th>利润率</th><th></th></tr></thead>'+
        '<tbody>'+mapRows+'</tbody>'+
      '</table>'+
      '<div style="margin-top:12px;display:flex;gap:8px;align-items:center;">'+
        '<input type="number" id="newPrice" placeholder="新售价" step="0.01" style="font-family:var(--font-mono);padding:6px 8px;width:100px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--surface);color:var(--ink)">'+
        '<input type="number" id="newProfit" placeholder="利润" step="0.01" style="font-family:var(--font-mono);padding:6px 8px;width:100px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--surface);color:var(--ink)">'+
        '<button class="btn-sm add" onclick="addPriceMap()">＋ 添加</button>'+
      '</div>'+
    '</div>'+
    '<div class="settings-section">'+
      '<h3>⚙️ 固定参数</h3>'+
      '<div class="params-grid">'+paramRows+'</div>'+
      '<div style="margin-top:12px;font-size:11px;color:var(--ink-faint)">💡 参数也可在右侧仪表盘中直接编辑</div>'+
    '</div>'+
    '<div class="settings-section">'+
      '<h3>💾 数据管理</h3>'+
      '<div class="data-actions">'+
        '<button class="btn-action" onclick="exportData()">📤 导出备份</button>'+
        '<button class="btn-action" onclick="document.getElementById(\'importFile\').click()">📥 导入备份</button>'+
        '<button class="btn-action danger" onclick="resetData()">⚠ 重置全部数据</button>'+
        '<input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)">'+
      '</div>'+
      '<div style="margin-top:8px;font-size:11px;color:var(--ink-faint)">共 '+totalOrders+' 条订单 · '+activeOrders+' 有效 · '+refundedOrders+' 已退款 · '+DATA.priceMap.length+' 条价格映射</div>'+
    '</div>';
}

function onPriceMapChange(input) {
  var oldPrice=parseFloat(input.dataset.old);
  var field=input.dataset.field;
  var newVal=parseFloat(input.value);
  if(isNaN(newVal)) return;
  var item=DATA.priceMap.find(function(p){return Math.abs(p.price-oldPrice)<0.001;});
  if(!item) return;
  if(field==='price') {
    var dup=DATA.priceMap.find(function(p){return Math.abs(p.price-newVal)<0.001&&Math.abs(p.price-oldPrice)>0.001;});
    if(dup){toast('价格已存在');input.value=oldPrice;return;}
    item.price=newVal;
    input.dataset.old=newVal;
  } else { item.profit=newVal; }
  saveData(DATA);
  toast('已更新');
  refresh();
}
function addPriceMap() {
  var price=parseFloat($('#newPrice').value);
  var profit=parseFloat($('#newProfit').value);
  if(isNaN(price)||isNaN(profit)){toast('请填写售价和利润');return;}
  if(DATA.priceMap.find(function(p){return Math.abs(p.price-price)<0.001;})){toast('该价格已存在，请直接修改');return;}
  DATA.priceMap.push({price:price,profit:profit});
  saveData(DATA);
  toast('✓ 已添加 ¥'+fmt(price)+' → ¥'+fmt(profit));
  refresh();
}
function deletePriceMap(price) {
  if(!confirm('删除价格映射 ¥'+price+'？')) return;
  DATA.priceMap=DATA.priceMap.filter(function(p){return Math.abs(p.price-price)>0.001;});
  saveData(DATA);
  toast('已删除');
  refresh();
}
function onParamChange(key, val) {
  var num=parseFloat(val);
  if(isNaN(num)) return;
  DATA.params[key]=num;
  saveData(DATA);
  renderPanel();
}
function exportData() {
  var blob=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='对账数据备份_'+todayStr()+'.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('✓ 数据已导出');
}
function importData(input) {
  var file=input.files[0];
  if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var imported=JSON.parse(e.target.result);
      if(!imported.orders||!imported.priceMap||!imported.params) throw new Error('数据格式不正确');
      if(!confirm('即将导入 '+imported.orders.length+' 条订单和 '+imported.priceMap.length+' 条价格映射。当前数据将被覆盖，确定？')) return;
      DATA=imported;
      DATA.orders.forEach(function(o){
        if(o.category===undefined) o.category='其他';
        if(o.priceTier===undefined) o.priceTier=getPriceTierObj(o.revenue).label;
        if(o.refunded===undefined) o.refunded=false;
      });
      if(DATA.inventory===undefined) DATA.inventory=[];
      saveData(DATA);
      toast('✓ 数据已导入');
      currentDate=todayStr();
      refresh();
    }catch(err){toast('导入失败：'+err.message);}
  };
  reader.readAsText(file);
  input.value='';
}
function resetData() {
  if(!confirm('确定要删除全部数据？此操作不可撤销！')) return;
  if(!confirm('再次确认：删除所有订单、价格映射和参数设置？')) return;
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(DEMO_KEY);
  DATA=initData();
  toast('数据已重置');
  refresh();
}

// ============================================================
// PHASE 1+4: Dual Tab Switching (Desktop + Mobile Bottom Nav)
// ============================================================
var activeTab='today';

function switchTab(tab) {
  activeTab=tab;
  // Desktop tabs
  $$('.tab-d').forEach(function(t){t.classList.toggle('active',t.dataset.tab===tab);});
  // Mobile bottom nav
  $$('.nav-btn').forEach(function(n){n.classList.toggle('active',n.dataset.nav===tab);});
  // Render
  if(tab==='today') renderToday();
  else if(tab==='month') renderMonth();
  else if(tab==='summary') renderSummary();
  else if(tab==='inventory') renderInventory();
  else if(tab==='settings') renderSettings();
  renderPanel();
}

function refresh() {
  switchTab(activeTab);
  updateHeaderDate();
}

function updateHeaderDate() {
  var now=new Date();
  var el=$('#headerDate');
  if(!el) return;
  el.textContent=now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日 星期'+
    ['日','一','二','三','四','五','六'][now.getDay()]+' '+
    String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
}

// ============================================================
// ============================================================
// PHASE 4: PWA Install — 点击即弹原生安装对话框
// ============================================================
var deferredPrompt = null;
var installBtn = document.getElementById('btnInstall');

// ── SW 注册 ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js', { scope: './' }).catch(function(){});
}

// ── 捕获 beforeinstallprompt ──
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredPrompt = e;
  if (installBtn) installBtn.textContent = '⬇️ 安装到桌面';
});

// ── 安装成功 ──
window.addEventListener('appinstalled', function() {
  deferredPrompt = null;
  if (installBtn) { installBtn.textContent = '✅ 已安装'; }
});

// ── 点击安装：直接弹原生对话框 ──
function promptInstall() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt = null;
}
// PHASE 5.2: Keyboard Shortcuts
// ============================================================
var tabOrder = ['today','month','summary','inventory','settings'];

document.addEventListener('keydown', function(e) {
  // Ctrl+N: focus input
  if ((e.ctrlKey||e.metaKey) && e.key==='n') {
    e.preventDefault();
    switchTab('today');
    setTimeout(function(){var inp=$('#priceInput');if(inp)inp.focus();},100);
    return;
  }
  // Ctrl+1~5: switch tabs
  if ((e.ctrlKey||e.metaKey) && e.key>='1' && e.key<='5') {
    e.preventDefault();
    var idx=parseInt(e.key)-1;
    switchTab(tabOrder[idx]);
    return;
  }
  // ? : show keyboard shortcuts
  if (e.key==='?' && !e.ctrlKey && !e.metaKey && !e.altKey &&
      document.activeElement===document.body) {
    e.preventDefault();
    toggleKB();
    return;
  }
  // Esc: close panels
  if (e.key==='Escape') {
    closeKB();
    return;
  }
  // ← → : navigate date (today tab)
  if (activeTab==='today' && !e.ctrlKey && !e.metaKey && !e.altKey &&
      document.activeElement===document.body) {
    if (e.key==='ArrowLeft') { e.preventDefault(); changeDay(-1); }
    if (e.key==='ArrowRight') { e.preventDefault(); changeDay(1); }
  }
});

function toggleKB() {
  var overlay = document.getElementById('kbOverlay');
  if (!overlay) return;
  overlay.classList.toggle('show');
}
function closeKB() {
  var overlay = document.getElementById('kbOverlay');
  if (overlay) overlay.classList.remove('show');
}

// ============================================================
// Event Listeners
// ============================================================
// Desktop tabs
$$('.tab-d').forEach(function(tab) {
  tab.addEventListener('click', function(){ switchTab(tab.dataset.tab); });
});

// Mobile bottom nav
$$('.nav-btn').forEach(function(btn) {
  btn.addEventListener('click', function(){ switchTab(btn.dataset.nav); });
});

// Month/year change — event delegation
document.addEventListener('change', function(e) {
  if (e.target.id==='monthSelect'||e.target.id==='yearSelect') {
    onMonthYearChange();
  }
});

// Auto-save on unload
window.addEventListener('beforeunload', function() {
  saveData(DATA);
  if (fileSyncEnabled && dirHandle) writeToFile(DATA);
});

// ============================================================
// Init
// ============================================================
boot();
</script>
